<!DOCTYPE html>
<html lang="en">

<head>

	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<link rel="stylesheet" href="css/font-awesome.min.css">
	<link rel="stylesheet" href="css/bootstrap.css">
	<link rel="stylesheet" href="css/main.css">
	<title>Theme</title>
</head>

<body style="background:black">
	<!-- background gradient panel -->
	<div class="panel-container">

		<div class="button-panel">
			<div class="button-choice button-one active-btn bg-sun"></div>
			<div class="button-choice button-two "></div>
			<div class="button-choice button-three"></div>

		</div>
		<div class="panel-slide-button">
			<i class="fa fa-wrench" aria-hidden="true"></i>
		</div>
	</div>
	<!-- background gradient panel -->

	<!-- overlay -->
	<div class="overlay-theme">
		<div class="overlay-theme__top  dark"></div>
		<div class="overlay-theme__bottom dark "></div>
	</div>

	<section class="carrouselTeam-container pt-4 pb-2">
		<div id="carrouselTeam" class="carrouselTeam-slider carousel slide" data-ride="carousel">
			<ol class="carousel-indicators ">
				<li data-target="#carrouselTeam" data-slide-to="0" class="active"></li>
				<li data-target="#carrouselTeam" data-slide-to="1" class=""></li>
				<li data-target="#carrouselTeam" data-slide-to="2" class=""></li>

			</ol>
			<div class="carousel-inner " role="listbox">
				<div class="carousel-item active carousel-item-left">
					<img class="carousel-img border-sun" src="images/team/team1.jpg" alt="First slide">
					<div class="carousel-caption d-none d-md-block mt-4">
						<h3 class="text-light"><i class="fa fa-quote-left text-sun"></i> Lorem ipsum dolor sit amet, consectetur ! <i
							 class="fa fa-quote-right text-sun"></i></h3>
						<p class="text-light">Alex Andrew</p>
					</div>
				</div>

				<div class="carousel-item carousel-item-next carousel-item-left">
					<img class="carousel-img border-sun" src="images/team/team2.jpg" alt="second slide">
					<div class="carousel-caption d-none d-md-block mt-4">
						<h3 class="text-light"><i class="fa fa-quote-left text-sun"></i> Lorem ipsum dolor sit adipis amet, consectetur .
							<i class="fa fa-quote-right text-sun"></i></h3>
						<p class="text-light">Anna Deo</p>
					</div>
				</div>

				<div class="carousel-item carousel-item-next carousel-item-left">
					<img class="carousel-img border-sun" src="images/team/team3.jpg" alt="Third slide">
					<div class="carousel-caption d-none d-md-block mt-4">
						<h3 class="text-light"><i class="fa fa-quote-left text-sun"></i> Lorem ipsum dolor sit adipis amet, consectetur .
							<i class="fa fa-quote-right text-sun"></i></h3>
						<p class="text-light">Jhon Deo</p>
					</div>
				</div>
			</div>
			<a class="carousel-control-prev" href="#carrouselTeam" role="button" data-slide="prev">
				<span class="carousel-control "><i class="fa fa-chevron-left text-sun"></i></span>
				<span class="sr-only">Previous</span>
			</a>
			<a class="carousel-control-next" href="#carrouselTeam" role="button" data-slide="next">
				<span class="carousel-control "><i class="fa fa-chevron-right text-sun"></i></span>
				<span class="sr-only">Next</span>
			</a>
		</div>
	</section>
	<script src="dist/js/main.min.js"></script>

</body>

</html>
